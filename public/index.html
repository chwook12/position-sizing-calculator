<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>포지션 사이징 계산기</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <h1>포지션 사이징 계산기</h1>
        <p>종목명 검색 · 6개국 마켓 · 실시간 계산</p>
      </header>

      <section class="panel form-panel" aria-label="포지션 입력">
        <div class="settings-grid">
          <label class="field">
            <span>국가/통화</span>
            <select id="market">
              <option value="AUTO">🌐 자동 감지</option>
              <option value="KR" selected>🇰🇷 KR (KRW)</option>
              <option value="US">🇺🇸 US (USD)</option>
              <option value="JP">🇯🇵 JP (JPY)</option>
              <option value="HK">🇭🇰 HK (HKD)</option>
              <option value="CN">🇨🇳 CN (CNY)</option>
              <option value="VN">🇻🇳 VN (VND)</option>
            </select>
          </label>

          <label class="field">
            <span>봉 기준</span>
            <select id="candleMode">
              <option value="D" selected>일봉</option>
              <option value="W">주봉</option>
            </select>
          </label>
        </div>

        <div class="symbol-row">
          <label class="field symbol-field">
            <span>종목명 또는 심볼</span>
            <input
              id="query"
              type="text"
              autocomplete="off"
              placeholder="삼성전자, 애플, TSLA, 005930"
            />
          </label>
          <button id="loadPrice" type="button">가격 불러오기</button>
        </div>
        <div id="suggestions" class="suggestions" hidden></div>
        <p id="selectedStock" class="selected-stock">종목을 검색해 주세요.</p>

        <div class="date-grid">
          <label class="field">
            <span>진입가 기준</span>
            <select id="entryDateMode">
              <option value="TODAY" selected>최신 거래일</option>
              <option value="PREV">직전 거래일</option>
            </select>
          </label>
          <label class="field">
            <span>손절가 기준</span>
            <select id="stopDateMode">
              <option value="TODAY" selected>최신 거래일</option>
              <option value="PREV">직전 거래일</option>
            </select>
          </label>
        </div>

        <div class="venue-grid">
          <label class="field">
            <span>진입가 기준</span>
            <select id="entryVenue">
              <option value="KRX" selected>KRX</option>
              <option value="NXT">NXT (20분 지연)</option>
            </select>
          </label>
          <label class="field">
            <span>손절가 기준</span>
            <select id="stopVenue">
              <option value="KRX" selected>KRX</option>
              <option value="NXT">NXT (20분 지연)</option>
            </select>
          </label>
        </div>

        <div class="direction-group" role="group" aria-label="방향">
          <button id="longBtn" class="direction active" type="button" data-direction="long">
            <span class="dot green"></span>
            롱 (Long)
          </button>
          <button id="shortBtn" class="direction" type="button" data-direction="short">
            <span class="dot red"></span>
            숏 (Short)
          </button>
        </div>

        <label class="field">
          <span>RPT 원화 기준 (RISK PER TRADE)</span>
          <div class="money-input">
            <span id="rptBaseSymbol" class="currency-prefix">₩</span>
            <input id="rpt" inputmode="decimal" />
          </div>
          <small id="convertedRpt" class="converted-rpt">적용 RPT: ₩1,000,000</small>
        </label>

        <label class="field">
          <span>진입가 (ENTRY)</span>
          <div class="money-input">
            <span id="entrySymbol" class="currency-prefix">₩</span>
            <input id="entry" inputmode="decimal" placeholder="가격 불러오기를 누르면 채워집니다" />
          </div>
        </label>

        <label class="field">
          <span>손절가 (STOP)</span>
          <div class="money-input">
            <span id="stopSymbol" class="currency-prefix">₩</span>
            <input id="stop" inputmode="decimal" placeholder="롱은 기준일 저가, 숏은 기준일 고가" />
          </div>
        </label>
      </section>

      <section class="panel result-panel" aria-label="계산 결과">
        <article>
          <span>SL %</span>
          <strong id="slPercent" class="danger">-</strong>
        </article>
        <article>
          <span>수량 (QTY)</span>
          <strong id="qty" class="accent">-</strong>
        </article>
        <article>
          <span>포지션 사이즈</span>
          <strong id="positionSize">-</strong>
        </article>
        <article>
          <span>리스크 금액</span>
          <strong id="riskAmount" class="warn">-</strong>
        </article>
      </section>
      <p id="calculationNote" class="calculation-note" hidden></p>

      <footer>
        <p>수량 = floor(RPT ÷ |진입가 - 손절가|) · 포지션 = 수량 × 진입가</p>
        <p>최신/직전은 선택한 시장의 현지 거래일 또는 거래주 기준으로 계산합니다.</p>
      </footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
